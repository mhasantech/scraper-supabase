name: Market Scraper (CSE + DSE + DSEX + Daily Closing)

on:
  schedule:
    # প্রতি ১৫ মিনিটে, রবি থেকে বৃহস্পতিবার (সপ্তাহের ০-৪)
    - cron: '*/15 * * * 0-4'
    # প্রতিদিন বাংলাদেশ সময় বিকাল ৪:৩০ টায় (UTC ৯:৩০) – ক্লোজিং ডেটার জন্য
    - cron: '30 10 * * 0-4'
  workflow_dispatch: # ম্যানুয়াল রান

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run CSE Scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/cse_scraper.js

      - name: Run DSE Scraper (Live + Closing)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/dse_scraper.js

      - name: Run DSEX Scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/dsex_scraper.js

  daily-closing:
    runs-on: ubuntu-latest
    needs: scrape
    if: github.event.schedule == '30 9 * * 0-4' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Update Daily Closing Prices (CSE)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/update_daily_closing.js
