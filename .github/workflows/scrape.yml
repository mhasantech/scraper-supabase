name: Market Scraper + Daily Closing

on:
  schedule:
    # প্রতি ১৫ মিনিটে স্ক্র্যাপ (আগের মতো)
    - cron: '*/15 * * * 0-4'
    # প্রতিদিন বিকাল ৩:৩০ টায় (বাংলাদেশ সময় UTC+6 → ৯:৩০ UTC)
    - cron: '30 9 * * 0-4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # ... (আপনার আগের স্ক্র্যাপ জব)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run CSE Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/cse_scraper.js
      - name: Run DSE Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/dse_scraper.js

  daily-closing:
    runs-on: ubuntu-latest
    needs: scrape   # স্ক্র্যাপ শেষ হওয়ার পর রান করবে (যদি একই সময়ে ট্রিগার হয়)
    if: github.event.schedule == '30 9 * * 0-4' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Update Daily Closing Prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/update_daily_closing.js
